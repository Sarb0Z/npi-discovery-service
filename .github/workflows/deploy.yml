name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      apply_infra:
        description: Apply Terraform before deploying
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: production-deploy-${{ github.event.workflow_run.head_branch || github.ref_name || 'manual' }}
  cancel-in-progress: false

jobs:
  provision-infra:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      render_api_service_id: ${{ steps.deploy_targets.outputs.render_api_service_id }}
      render_api_url: ${{ steps.deploy_targets.outputs.render_api_url }}
      vercel_project_id: ${{ steps.deploy_targets.outputs.vercel_project_id }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_infra }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: hashicorp/setup-terraform@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_infra }}
        with:
          terraform_version: 1.8.5

      - name: Apply production infrastructure
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_infra }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_OWNER_ID" ] || [ -z "$VERCEL_API_TOKEN" ]; then
            echo "Missing required infrastructure secrets"
            exit 1
          fi

          ./scripts/terraform-env.sh apply production

      - name: Resolve deployment targets
        id: deploy_targets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.apply_infra }}" = "true" ]; then
            render_api_service_id=$(terraform -chdir=infra/terraform/environments/production output -raw render_api_service_id)
            render_api_url=$(terraform -chdir=infra/terraform/environments/production output -raw render_api_url)
            vercel_project_id=$(terraform -chdir=infra/terraform/environments/production output -raw vercel_project_id)
          else
            if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_API_SERVICE_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
              echo "Missing required deploy secrets"
              echo "Expected RENDER_API_KEY, RENDER_API_SERVICE_ID, and VERCEL_PROJECT_ID"
              exit 1
            fi

            render_api_service_id="$RENDER_API_SERVICE_ID"
            vercel_project_id="$VERCEL_PROJECT_ID"

            service_response=$(curl --fail-with-body --silent --show-error \
              --url "https://api.render.com/v1/services/${render_api_service_id}" \
              --header "accept: application/json" \
              --header "authorization: Bearer ${RENDER_API_KEY}")

            render_api_url=$(printf '%s' "$service_response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(payload.serviceDetails?.url ?? '')")

            if [ -z "$render_api_url" ]; then
              echo "Render API URL was not returned for service ${render_api_service_id}"
              echo "$service_response"
              exit 1
            fi
          fi

          echo "render_api_service_id=${render_api_service_id}" >> "$GITHUB_OUTPUT"
          echo "render_api_url=${render_api_url}" >> "$GITHUB_OUTPUT"
          echo "vercel_project_id=${vercel_project_id}" >> "$GITHUB_OUTPUT"

  deploy-api:
    needs:
      - provision-infra
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ needs.provision-infra.outputs.render_api_service_id }}
        run: |
          deploy_response=$(curl --fail-with-body --silent --show-error --request POST \
            --url "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${RENDER_API_KEY}")

          deploy_id=$(printf '%s' "$deploy_response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(payload.id ?? payload.deploy?.id ?? '')")

          if [ -z "$deploy_id" ]; then
            echo "Render deploy ID was not returned"
            echo "$deploy_response"
            exit 1
          fi

          for attempt in $(seq 1 90); do
            status_response=$(curl --fail-with-body --silent --show-error \
              --url "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys/${deploy_id}" \
              --header "accept: application/json" \
              --header "authorization: Bearer ${RENDER_API_KEY}")

            deploy_status=$(printf '%s' "$status_response" | node -e "const fs = require('fs'); const payload = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(String(payload.status ?? payload.deploy?.status ?? 'unknown').toLowerCase())")

            echo "Render deploy ${deploy_id} status: ${deploy_status}"

            if [ "$deploy_status" = "live" ]; then
              exit 0
            fi

            if [ "$deploy_status" = "build_failed" ] || [ "$deploy_status" = "update_failed" ] || [ "$deploy_status" = "canceled" ] || [ "$deploy_status" = "failed" ]; then
              echo "$status_response"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Render deploy ${deploy_id} to become live"
          exit 1

  deploy-frontend:
    needs:
      - provision-infra
      - deploy-api
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - run: bun install --frozen-lockfile

      - name: Link Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ needs.provision-infra.outputs.vercel_project_id }}
        run: |
          mkdir -p apps/frontend/.vercel
          cat <<EOF > apps/frontend/.vercel/project.json
          {"orgId":"${VERCEL_ORG_ID}","projectId":"${VERCEL_PROJECT_ID}"}
          EOF

      - name: Pull Vercel environment
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
        run: bunx vercel pull apps/frontend --yes --environment=production --token="$VERCEL_API_TOKEN"

      - name: Build Vercel output
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
        run: bunx vercel build apps/frontend --prod --token="$VERCEL_API_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
        run: |
          deployment_url=$(bunx vercel deploy apps/frontend --prebuilt --prod --token="$VERCEL_API_TOKEN")
          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"

  smoke-tests:
    needs:
      - provision-infra
      - deploy-api
      - deploy-frontend
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check Render health endpoint
        run: curl --fail --silent --show-error "${{ needs.provision-infra.outputs.render_api_url }}/api/health"

      - name: Check Vercel deployment
        run: curl --fail --silent --show-error "${{ needs.deploy-frontend.outputs.deployment_url }}"
