name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/api/node_modules
            apps/frontend/node_modules
            packages/contracts/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}

      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/api/node_modules
            apps/frontend/node_modules
            packages/contracts/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}

      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/api/node_modules
            apps/frontend/node_modules
            packages/contracts/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}

      - run: bun install --frozen-lockfile
      - run: bun run test:cov

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/api/node_modules
            apps/frontend/node_modules
            packages/contracts/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', '**/package.json') }}

      - run: bun install --frozen-lockfile
      - run: bun run build
