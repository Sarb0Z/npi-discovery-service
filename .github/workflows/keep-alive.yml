name: Keep Alive

on:
  schedule:
    # Every 27 minutes — stays well within Render's 30-minute inactivity timeout.
    # Free for public repos; ~3 090 min/month for private (adjust if over budget).
    - cron: '*/27 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  warm-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Skip if repository idle > 7 days
        run: |
          repo="$GITHUB_REPOSITORY"
          token="$GITHUB_TOKEN"
          if [ -z "$token" ]; then
            echo "Missing GITHUB_TOKEN"
            exit 1
          fi

          # Fetch recent workflow runs and pick the first non-keep-alive run
          runs_json=$(curl -s -H "Authorization: Bearer $token" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$repo/actions/runs?per_page=10")
            last_date=$(printf '%s' "$runs_json" | python3 - <<'PY'
            import sys, json
            data=json.load(sys.stdin)
            for r in data.get('workflow_runs', []):
              if r.get('name') != 'Keep Alive':
                print(r.get('created_at') or '')
                sys.exit(0)
            print('')
            PY
            )

          if [ -z "$last_date" ]; then
            echo "No recent non-keep-alive workflow runs found; skipping keep-alive.";
            exit 0
          fi

          last_ts=$(date -d "$last_date" +%s)
          now_ts=$(date +%s)
          diff_days=$(( (now_ts - last_ts) / 86400 ))
          if [ "$diff_days" -gt 7 ]; then
            echo "Last non-keep-alive workflow run was ${diff_days} days ago; skipping keep-alive.";
            exit 0
          fi
          echo "Recent activity detected (${diff_days} days ago); continuing."

      - name: Resolve Render API URL
        id: url
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ vars.RENDER_API_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_API_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_API_SERVICE_ID"
            exit 1
          fi

          # Sanitize: strip whitespace and accidental "Bearer " prefix
          _render_key=$(printf '%s' "$RENDER_API_KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          _render_key="${_render_key#Bearer }"
          _render_key="${_render_key#bearer }"

          service_response=$(curl -w "\n%{http_code}" --silent --show-error \
            --url "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${_render_key}")

          http_code=$(printf '%s' "$service_response" | tail -1)
          response_body=$(printf '%s' "$service_response" | sed '$d')

          if [ "$http_code" -lt 200 ] 2>/dev/null || [ "$http_code" -ge 300 ] 2>/dev/null; then
            echo "::error::Render API returned HTTP ${http_code}. Verify RENDER_API_KEY (no whitespace, no 'Bearer ' prefix)."
            echo "Response: ${response_body}"
            exit 1
          fi

          api_url=$(printf '%s' "$response_body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('serviceDetails',{}).get('url',''))")

          if [ -z "$api_url" ]; then
            echo "Could not resolve Render service URL"
            exit 1
          fi

          echo "api_url=${api_url}" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          curl --fail --silent --show-error \
            "${{ steps.url.outputs.api_url }}/api/health"

      - name: Provider search (small query)
        run: |
          # Jitter: random 1–3 second pause between probes
          sleep $(( RANDOM % 3 + 1 ))
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{"state":"WY","limit":5}' \
            "${{ steps.url.outputs.api_url }}/api/providers/search"

      - name: Statistics query
        run: |
          sleep $(( RANDOM % 3 + 1 ))
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{"state":"WY"}' \
            "${{ steps.url.outputs.api_url }}/api/statistics"

      - name: Single NPI lookup
        run: |
          sleep $(( RANDOM % 3 + 1 ))
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{"npi":"1234567893"}' \
            "${{ steps.url.outputs.api_url }}/api/providers/search"
