services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      PROVIDERS_OUTPUT_DIR: /app/output
    ports:
      - '3000:3000'
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then((response) => { if (!response.ok) { process.exit(1) } }).catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    depends_on:
      - redis
    volumes:
      - provider-output:/app/output

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - ../.env.example
    environment:
      NODE_ENV: production
      PORT: 3001
      API_URL: http://api:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - '3001:3001'
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  provider-output:
